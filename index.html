<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo Crucerr - Gestión Total</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root { --azul: #052c5c; --verde: #28a745; --rojo: #dc3545; --naranja: #fd7e14; --bg: #f4f7f6; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
    .header { background: var(--azul); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 10px; }
    .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
    
    input, select, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
    label { font-weight: bold; display: block; margin-top: 10px; color: #333; }
    
    button { color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-azul { background: var(--azul); }
    .btn-verde { background: var(--verde); }
    .btn-vender { background: var(--verde); padding: 18px; font-size: 18px; margin-top: 15px; }
    
    .nav-container { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
    .tab-btn { background: #ccc; color: #333; flex: 1; min-width: 80px; font-size: 14px; padding: 10px 5px; }
    .active-tab { background: var(--azul); color: white; }

    /* Estilos de Tabla de Inventario */
    .table-container { overflow-x: auto; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
    th { background: #eee; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    .stock-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    .stock-low { background: #ffebeb; color: var(--rojo); }
    .stock-ok { background: #ebffeb; color: var(--verde); }

    .total-box { background: var(--azul); color: white; padding: 15px; border-radius: 10px; text-align: right; margin-top: 15px; }
    .total-box span { font-size: 1.5rem; font-weight: bold; display: block; }
    
    .deuda-card { border-left: 6px solid var(--rojo); background: #fff; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<div class="header">
  <h2 style="margin:0;">GRUPO CRUCERR</h2>
  <div id="status" style="font-size:12px; font-weight: bold;">Sincronizando...</div>
</div>

<div class="nav-container">
  <button id="btn-vender-tab" class="tab-btn active-tab" onclick="cambiarVista('vender')">🛒 Vender</button>
  <button id="btn-stock-tab" class="tab-btn" onclick="cambiarVista('stock')">📦 Inventario</button>
  <button id="btn-clientes-tab" class="tab-btn" onclick="cambiarVista('clientes')">👥 Clientes</button>
</div>

<div id="vista-vender">
  <div class="card">
    <label>👤 Cliente:</label>
    <select id="v-cliente-sel"></select>
    <label>🔍 Producto:</label>
    <input type="text" id="buscador-prod" placeholder="Buscar medicamento..." oninput="filtrarProductosVenta()">
    <div style="display: flex; gap: 8px;">
      <div style="flex: 3;"><select id="v-prod-sel"></select></div>
      <div style="flex: 1;"><input type="number" id="v-cant" value="1" min="1"></div>
    </div>
    <button onclick="alCarrito()" class="btn-azul" style="margin-top:15px;">➕ Añadir al Pedido</button>
  </div>

  <div class="card">
    <h3>📋 Detalle del Pedido</h3>
    <div id="lista-carrito"></div>
    <div class="total-box">TOTAL VENTA <span id="total-lbl">L. 0.00</span></div>
    <label>Método de Pago:</label>
    <select id="v-metodo">
      <option value="contado">PAGO: CONTADO ✅</option>
      <option value="credito">PAGO: CRÉDITO ❌</option>
    </select>
    <button onclick="vender()" class="btn-vender">🚀 FINALIZAR Y FACTURAR</button>
  </div>

  <div class="card" style="border-top: 5px solid var(--rojo);">
    <h3>💰 Cuentas por Cobrar</h3>
    <div id="lista-deudas">Cargando...</div>
    <div class="total-box" style="background: var(--rojo);">PENDIENTE TOTAL <span id="total-deuda-lbl">L. 0.00</span></div>
  </div>
</div>

<div id="vista-stock" style="display:none;">
  <div class="card">
    <button onclick="abrirModalNuevo()" class="btn-verde">➕ Nuevo Producto</button>
    <label style="margin-top:15px;">🔍 Filtrar Inventario:</label>
    <input type="text" id="filtro-inv" placeholder="Nombre del producto..." oninput="renderInventarioTabla()">
    
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tabla-inv-body">
          </tbody>
      </table>
    </div>
  </div>
</div>

<div id="vista-clientes" style="display:none;">
  <div class="card">
    <h3>🆕 Nuevo Cliente</h3>
    <input type="text" id="c-nombre" placeholder="Nombre Negocio">
    <input type="text" id="c-direccion" placeholder="Dirección">
    <input type="text" id="c-tel" placeholder="Teléfono">
    <button onclick="guardarCliente()" class="btn-azul" style="margin-top:15px;">💾 Guardar Cliente</button>
  </div>
</div>

<div id="modal-producto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; padding:20px; box-sizing:border-box;">
  <div class="card" style="max-width:500px; margin:auto;">
    <h3 id="modal-titulo">Producto</h3>
    <input type="hidden" id="edit-id">
    <label>Nombre:</label>
    <input type="text" id="m-nombre">
    <label>Precio:</label>
    <input type="number" id="m-precio" step="0.01">
    <label>Stock Actual:</label>
    <input type="number" id="m-stock">
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button onclick="cerrarModal()" style="background:#666;">Cancelar</button>
      <button id="btn-guardar-prod" onclick="procesarProducto()" class="btn-verde">Guardar</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://jbdfuhowfqfjmpjygaow.supabase.co';
const SB_KEY = 'sb_publishable_4mLkbjij9oGVtS_zX051VQ_Vsbjjga9';
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let productos = [], clientes = [], carrito = [];

window.onload = cargarTodo;

async function cargarTodo() {
  document.getElementById('status').innerText = '⏳ Sincronizando...';
  const { data: p } = await _supabase.from('inventario').select('*').order('nombre');
  const { data: c } = await _supabase.from('pulperia').select('*').order('nombre');
  const { data: v } = await _supabase.from('ventas').select('*').eq('pagado', false).order('fecha', {ascending: false});

  productos = p || []; clientes = c || [];
  actualizarSelectsVenta();
  renderInventarioTabla();
  renderDeudas(v || []);
  document.getElementById('status').innerText = '● Sistema Online';
}

function actualizarSelectsVenta() {
  const h = productos.map(p => `<option value="${p.id}">${p.nombre} (Stock: ${p.stock})</option>`).join('');
  document.getElementById('v-prod-sel').innerHTML = h;
  document.getElementById('v-cliente-sel').innerHTML = clientes.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
}

function renderInventarioTabla() {
  const filtro = document.getElementById('filtro-inv').value.toLowerCase();
  const lista = productos.filter(p => p.nombre.toLowerCase().includes(filtro));
  const body = document.getElementById('tabla-inv-body');
  
  body.innerHTML = lista.map(p => `
    <tr>
      <td><b>${p.nombre}</b></td>
      <td>L. ${p.precio.toFixed(2)}</td>
      <td><span class="stock-badge ${p.stock < 10 ? 'stock-low' : 'stock-ok'}">${p.stock}</span></td>
      <td><button onclick="abrirModalEditar(${p.id})" style="background:var(--azul); padding:5px; font-size:12px;">Editar</button></td>
    </tr>
  `).join('');
}

function cambiarVista(vista) {
  document.querySelectorAll('[id^="vista-"]').forEach(d => d.style.display = 'none');
  document.getElementById('vista-' + vista).style.display = 'block';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
  document.getElementById('btn-' + vista + '-tab').classList.add('active-tab');
}

// LÓGICA DE PRODUCTOS (MODAL)
function abrirModalNuevo() {
  document.getElementById('modal-titulo').innerText = "Nuevo Producto";
  document.getElementById('edit-id').value = "";
  document.getElementById('m-nombre').value = "";
  document.getElementById('m-precio').value = "";
  document.getElementById('m-stock').value = "";
  document.getElementById('modal-producto').style.display = 'block';
}

function abrirModalEditar(id) {
  const p = productos.find(x => x.id == id);
  document.getElementById('modal-titulo').innerText = "Editar Producto";
  document.getElementById('edit-id').value = p.id;
  document.getElementById('m-nombre').value = p.nombre;
  document.getElementById('m-precio').value = p.precio;
  document.getElementById('m-stock').value = p.stock;
  document.getElementById('modal-producto').style.display = 'block';
}

function cerrarModal() { document.getElementById('modal-producto').style.display = 'none'; }

async function procesarProducto() {
  const id = document.getElementById('edit-id').value;
  const datos = {
    nombre: document.getElementById('m-nombre').value,
    precio: parseFloat(document.getElementById('m-precio').value),
    stock: parseInt(document.getElementById('m-stock').value)
  };

  if(id) {
    await _supabase.from('inventario').update(datos).eq('id', id);
  } else {
    await _supabase.from('inventario').insert([datos]);
  }
  cerrarModal(); cargarTodo();
}

// REUTILIZACIÓN DE FUNCIONES DE VENTA
function filtrarProductosVenta() {
  const bus = document.getElementById('buscador-prod').value.toLowerCase();
  const filtrados = productos.filter(p => p.nombre.toLowerCase().includes(bus));
  document.getElementById('v-prod-sel').innerHTML = filtrados.map(p => `<option value="${p.id}">${p.nombre} (Stock: ${p.stock})</option>`).join('');
}

function alCarrito() {
  const id = document.getElementById('v-prod-sel').value;
  const cant = parseInt(document.getElementById('v-cant').value);
  const p = productos.find(x => x.id == id);
  if(cant > p.stock) return alert("Stock insuficiente");
  carrito.push({ id: p.id, nombre: p.nombre, cant, precio: p.precio, subt: p.precio * cant });
  renderCarrito();
}

function renderCarrito() {
  const div = document.getElementById('lista-carrito');
  let t = 0; div.innerHTML = '';
  carrito.forEach((item, i) => {
    t += item.subt;
    div.innerHTML += `<div style="padding:5px 0; border-bottom:1px solid #eee;">${item.nombre} (x${item.cant}) - L.${item.subt.toFixed(2)} <button onclick="carrito.splice(${i},1);renderCarrito()" style="background:var(--rojo); width:auto; padding:2px 8px; float:right;">X</button></div>`;
  });
  document.getElementById('total-lbl').innerText = `L. ${t.toFixed(2)}`;
}

async function vender() {
  if(carrito.length === 0) return;
  const cli = document.getElementById('v-cliente-sel').value;
  const met = document.getElementById('v-metodo').value;
  const tot = carrito.reduce((s,i)=>s+i.subt, 0);

  await _supabase.from('ventas').insert([{ cliente: cli, total: tot, metodo_pago: met, pagado: met === 'contado', detalle: JSON.stringify(carrito) }]);
  for(const item of carrito) {
    const p = productos.find(x => x.id == item.id);
    await _supabase.from('inventario').update({ stock: p.stock - item.cant }).eq('id', item.id);
  }
  generarFacturaPDF(cli, tot, met, [...carrito]);
  location.reload();
}

async function guardarCliente() {
  const nombre = document.getElementById('c-nombre').value;
  const direccion = document.getElementById('c-direccion').value;
  const telefono = document.getElementById('c-tel').value;
  await _supabase.from('pulperia').insert([{ nombre, direccion, telefono }]);
  alert("Cliente guardado"); cargarTodo();
}

function renderDeudas(deudas) {
  const div = document.getElementById('lista-deudas');
  let t = 0;
  div.innerHTML = deudas.map(d => {
    t += d.total;
    return `<div class="deuda-card"><p><b>👤 ${d.cliente}</b></p><p>Total: L. ${d.total.toFixed(2)}</p><button onclick="marcarPagado(${d.id})" style="background:var(--azul); width:auto; padding:5px 10px;">Marcar Pagado</button></div>`;
  }).join('');
  document.getElementById('total-deuda-lbl').innerText = `L. ${t.toFixed(2)}`;
}

async function marcarPagado(id) {
  await _supabase.from('ventas').update({ pagado: true }).eq('id', id);
  cargarTodo();
}

function generarFacturaPDF(cliente, total, metodo, detalle) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("GRUPO CRUCERR", 105, 20, { align: "center" });
  doc.text(`CLIENTE: ${cliente}`, 20, 40);
  const body = detalle.map(i => [i.nombre, i.cant, `L.${i.precio}`, `L.${i.subt.toFixed(2)}`]);
  doc.autoTable({ head: [['Producto', 'Cant', 'Precio', 'Subtotal']], body: body, startY: 50 });
  doc.save(`Venta_${cliente}.pdf`);
}
</script>
</body>
</html>
